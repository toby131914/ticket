<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>搶票系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #e8192c; --red-dark: #b5111e; --red-glow: rgba(232,25,44,0.25);
      --bg: #080809; --s1: #0f0f11; --s2: #161619;
      --border: rgba(255,255,255,0.07); --text: #f0f0f0; --muted: #52525c;
      --green: #22c55e; --yellow: #fbbf24;
      --mono: 'JetBrains Mono', monospace;
      --display: 'Bebas Neue', cursive;
      --sans: 'Noto Sans TC', sans-serif;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--sans); min-height: 100vh;
    }

    /* ─── PAGES ─── */
    .page { display: none; min-height: 100vh; }
    .page.active { display: block; }

    /* ══════════════════════════════
       LOGIN PAGE
    ══════════════════════════════ */
    #loginPage {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
      background: var(--bg);
      position: relative; overflow: hidden;
    }

    #loginPage::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(232,25,44,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(232,25,44,0.05) 0%, transparent 50%);
      pointer-events: none;
    }

    /* Grid lines */
    #loginPage::after {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    .login-box {
      position: relative; z-index: 1;
      width: 100%; max-width: 400px;
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 32px;
      animation: loginIn 0.5s ease both;
    }

    @keyframes loginIn {
      from { opacity:0; transform: translateY(24px) scale(0.97); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo .icon {
      width: 56px; height: 56px;
      background: var(--red);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px;
      font-size: 26px;
      box-shadow: 0 8px 32px var(--red-glow);
    }

    .login-logo h1 {
      font-family: var(--display);
      font-size: 32px;
      letter-spacing: 0.05em;
      color: #fff;
    }

    .login-logo p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
      font-family: var(--mono);
      letter-spacing: 0.08em;
    }

    .login-divider {
      height: 1px;
      background: var(--border);
      margin: 0 0 24px;
    }

    .login-field { margin-bottom: 14px; }

    .login-field label {
      display: block;
      font-size: 11px;
      font-family: var(--mono);
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-bottom: 7px;
    }

    .login-field input {
      width: 100%;
      padding: 12px 16px;
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
    }

    .login-field input:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(232,25,44,0.08);
    }

    .login-field input::placeholder { color: #2a2a32; }

    .login-btn {
      width: 100%;
      margin-top: 8px;
      padding: 14px;
      background: var(--red);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: var(--display);
      font-size: 20px;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 24px var(--red-glow);
    }

    .login-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 32px var(--red-glow); }
    .login-btn:active { transform: translateY(0); }

    .login-note {
      margin-top: 18px;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
      font-family: var(--mono);
    }

    .login-error {
      display: none;
      margin-top: 10px;
      padding: 10px 14px;
      background: rgba(232,25,44,0.08);
      border: 1px solid rgba(232,25,44,0.3);
      border-radius: 8px;
      font-size: 12px;
      color: #f87171;
      text-align: center;
    }

    .login-error.show { display: block; }

    /* ══════════════════════════════
       MAIN PAGE
    ══════════════════════════════ */
    #mainPage { padding-bottom: 60px; }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: var(--s1);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }

    .topbar-left {
      font-family: var(--display);
      font-size: 22px;
      letter-spacing: 0.05em;
      color: #fff;
    }

    .topbar-left span { color: var(--red); }

    .user-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .user-badge:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }

    .user-avatar {
      width: 22px; height: 22px;
      background: var(--red);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }

    /* Hero */
    .hero {
      padding: 36px 20px 24px;
      text-align: center;
      position: relative; overflow: hidden;
    }

    .hero::after {
      content: '';
      position: absolute; bottom: -40px; left: 50%;
      transform: translateX(-50%);
      width: 280px; height: 120px;
      background: radial-gradient(ellipse, rgba(232,25,44,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero h2 {
      font-family: var(--display);
      font-size: clamp(52px, 15vw, 76px);
      letter-spacing: 0.04em;
      line-height: 0.9;
      color: #fff;
    }

    .hero h2 b { color: var(--red); font-weight: 400; }
    .hero p { margin-top: 10px; font-size: 12px; color: var(--muted); letter-spacing: 0.08em; }

    /* Cards */
    .main { max-width: 600px; margin: 0 auto; padding: 16px 16px 0; display: flex; flex-direction: column; gap: 14px; }

    .card {
      background: var(--s1); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px;
      animation: up 0.4s ease both;
    }
    .card:nth-child(2) { animation-delay: 0.05s; }
    .card:nth-child(3) { animation-delay: 0.10s; }
    .card:nth-child(4) { animation-delay: 0.15s; }

    @keyframes up {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .card-head { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .badge {
      width: 24px; height: 24px; background: var(--red);
      border-radius: 6px; display: flex; align-items: center; justify-content: center;
      font-family: var(--mono); font-size: 11px; font-weight: 700; flex-shrink: 0;
    }
    .card-head h2 { font-family: var(--mono); font-size: 11px; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; }

    .field { margin-bottom: 12px; }
    .field:last-child { margin-bottom: 0; }

    label { display: block; font-size: 11px; font-family: var(--mono); color: var(--muted); letter-spacing: 0.07em; margin-bottom: 6px; }

    input[type="text"], input[type="url"], input[type="email"], input[type="tel"], textarea {
      width: 100%; padding: 11px 14px;
      background: var(--s2); border: 1px solid var(--border);
      border-radius: 9px; color: var(--text);
      font-family: var(--sans); font-size: 15px;
      outline: none; transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
    }
    input:focus, textarea:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(232,25,44,0.08); }
    input::placeholder, textarea::placeholder { color: #2a2a32; }
    textarea { resize: vertical; min-height: 72px; font-size: 13px; line-height: 1.6; }

    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .time-row { display: flex; align-items: center; gap: 6px; }
    .time-row select {
      flex: 1; padding: 11px 4px;
      background: var(--s2); border: 1px solid var(--border);
      border-radius: 9px; color: var(--text);
      font-family: var(--mono); font-size: 20px; font-weight: 700;
      text-align: center; appearance: none; -webkit-appearance: none;
      outline: none; cursor: pointer;
    }
    .time-row select:focus { border-color: var(--red); }
    .colon { font-family: var(--mono); font-size: 24px; font-weight: 700; color: var(--red); flex-shrink: 0; }

    #prefillPreview {
      display: none; margin-top: 10px; padding: 10px 12px;
      background: var(--s2); border-radius: 8px;
      font-family: var(--mono); font-size: 10px; color: var(--muted);
      word-break: break-all; line-height: 1.6;
    }
    #prefillPreview.show { display: block; }

    /* Countdown */
    #countdown {
      display: none; text-align: center; padding: 20px;
      background: var(--s1); border: 1px solid var(--border); border-radius: 14px;
    }
    #countdown.show { display: block; }
    .cd-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
    .cd-time { font-family: var(--display); font-size: 56px; letter-spacing: 0.05em; color: #fff; line-height: 1; }
    .cd-time.urgent { color: var(--red); animation: flash 0.5s infinite; }
    @keyframes flash { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .cd-target { margin-top: 8px; font-family: var(--mono); font-size: 11px; color: var(--muted); }

    /* Buttons */
    #startBtn {
      width: 100%; padding: 17px;
      background: var(--red); border: none; border-radius: 11px;
      color: #fff; font-family: var(--display); font-size: 22px;
      letter-spacing: 0.08em; cursor: pointer; transition: all 0.2s;
      box-shadow: 0 4px 30px var(--red-glow);
    }
    #startBtn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 40px var(--red-glow); }
    #startBtn:disabled { background: #1e1e22; color: var(--muted); box-shadow: none; cursor: not-allowed; }

    #cancelBtn {
      display: none; width: 100%; margin-top: 10px; padding: 12px;
      background: transparent; border: 1px solid var(--border);
      border-radius: 9px; color: var(--muted); font-family: var(--sans);
      font-size: 13px; cursor: pointer; transition: all 0.15s;
    }
    #cancelBtn.show { display: block; }
    #cancelBtn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }

    #statusBox {
      display: none; margin-top: 12px; padding: 13px 16px;
      border-radius: 9px; font-family: var(--mono); font-size: 12px;
      border: 1px solid transparent; align-items: center; gap: 10px;
    }
    #statusBox.show { display: flex; }
    #statusBox.waiting { background: rgba(251,191,36,0.07); border-color: rgba(251,191,36,0.25); color: var(--yellow); }
    #statusBox.done    { background: rgba(34,197,94,0.07);  border-color: rgba(34,197,94,0.25);  color: var(--green); }
    #statusBox.error   { background: rgba(232,25,44,0.07);  border-color: rgba(232,25,44,0.25);  color: #f87171; }

    .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; animation: blink 1s infinite; }
    .done .dot, .error .dot { animation: none; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    .info { margin-top: 6px; font-size: 11px; color: var(--muted); line-height: 1.7; padding: 0 2px; }
  </style>
</head>
<body>

<!-- ══ LOGIN PAGE ══ -->
<div id="loginPage" class="page active">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">🎯</div>
      <h1>搶票系統</h1>
      <p>TICKET SNIPER · LOGIN</p>
    </div>
    <div class="login-divider"></div>

    <div class="login-field">
      <label>GOOGLE 帳號（EMAIL）</label>
      <input type="email" id="loginEmail" placeholder="yourname@gmail.com" autocomplete="email"/>
    </div>
    <div class="login-field">
      <label>姓名</label>
      <input type="text" id="loginName" placeholder="真實姓名"/>
    </div>
    <div class="login-field">
      <label>電話</label>
      <input type="tel" id="loginPhone" placeholder="09xxxxxxxx"/>
    </div>

    <button class="login-btn" onclick="doLogin()">進入搶票系統</button>

    <div class="login-error" id="loginError">請填寫所有欄位</div>

    <p class="login-note">
      此資料僅用於自動填入表單<br>不會上傳至任何伺服器
    </p>
  </div>
</div>

<!-- ══ MAIN PAGE ══ -->
<div id="mainPage" class="page">

  <div class="topbar">
    <div class="topbar-left">搶<span>票</span></div>
    <div class="user-badge" onclick="doLogout()">
      <div class="user-avatar" id="userAvatar">?</div>
      <span id="userEmailDisplay">未登入</span>
      <span style="font-size:10px;opacity:0.5">登出</span>
    </div>
  </div>

  <div class="hero">
    <h2>搶<b>票</b><br>系統</h2>
    <p>計時跳轉 · 自動預填 · 手機電腦通用</p>
  </div>

  <div class="main">

    <!-- 表單設定 -->
    <div class="card">
      <div class="card-head"><div class="badge">01</div><h2>表單設定</h2></div>
      <div class="field">
        <label>預填連結（從 Google 表單取得）</label>
        <textarea id="prefillRaw" rows="3" placeholder="貼上從 Google 表單「取得預填連結」複製的網址" oninput="parsePrefill()"></textarea>
        <p class="info" style="margin-top:6px;">📋 取得方式：開啟表單 → 右上角 ⋮ → <strong style="color:var(--text)">取得預填連結</strong> → 隨便填範例資料 → 複製連結</p>
      </div>
      <div id="parseResult" style="display:none; margin-top:10px; padding:10px 12px; background:var(--s2); border-radius:8px; font-family:var(--mono); font-size:11px; line-height:1.8;"></div>
      <div class="field" style="margin-top:14px;">
        <label>搶票時間</label>
        <div class="time-row" id="timePicker"></div>
      </div>
      <div id="prefillPreview"></div>
    </div>

    <!-- 個人資料（從登入帶入，可修改） -->
    <div class="card">
      <div class="card-head"><div class="badge">02</div><h2>個人資料</h2></div>
      <div class="grid2">
        <div class="field">
          <label>姓名</label>
          <input type="text" id="name" oninput="updatePreview()"/>
        </div>
        <div class="field">
          <label>暱稱</label>
          <input type="text" id="nick" placeholder="ID" oninput="updatePreview()"/>
        </div>
      </div>
      <div class="grid2">
        <div class="field">
          <label>電話</label>
          <input type="tel" id="phone" oninput="updatePreview()"/>
        </div>
        <div class="field">
          <label>電子郵件</label>
          <input type="email" id="email" oninput="updatePreview()"/>
        </div>
      </div>
    </div>

    <!-- 啟動 -->
    <div class="card">
      <div class="card-head"><div class="badge">03</div><h2>啟動</h2></div>
      <button id="startBtn" onclick="doStart()">🎯 設定完成，啟動搶票</button>
      <button id="cancelBtn" onclick="doCancel()">取消</button>
      <div id="statusBox">
        <span class="dot"></span>
        <span id="statusText"></span>
      </div>
    </div>

    <!-- 倒數 -->
    <div id="countdown">
      <div class="cd-label">距離搶票時間</div>
      <div class="cd-time" id="cdTime">--:--:--</div>
      <div class="cd-target" id="cdTarget"></div>
    </div>

  </div>
</div>

<script>
  // ── Login ──
  function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const name  = document.getElementById('loginName').value.trim();
    const phone = document.getElementById('loginPhone').value.trim();
    const err   = document.getElementById('loginError');

    if (!email || !name || !phone) {
      err.textContent = '請填寫所有欄位';
      err.classList.add('show');
      return;
    }
    if (!email.includes('@')) {
      err.textContent = '請輸入正確的 Email 格式';
      err.classList.add('show');
      return;
    }

    err.classList.remove('show');

    // 儲存登入資料
    sessionStorage.setItem('user', JSON.stringify({ email, name, phone }));

    // 帶入主頁
    loadUser({ email, name, phone });
    showPage('mainPage');
  }

  function loadUser(user) {
    document.getElementById('userEmailDisplay').textContent = user.email;
    document.getElementById('userAvatar').textContent = user.email[0].toUpperCase();
    document.getElementById('name').value  = user.name;
    document.getElementById('phone').value = user.phone;
    document.getElementById('email').value = user.email;
    updatePreview();
  }

  function doLogout() {
    if (!confirm('確定要登出？')) return;
    sessionStorage.clear();
    showPage('loginPage');
  }

  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // ── Time picker ──
  const tp = document.getElementById('timePicker');
  [['hour',24,'20'],['min',60,'00'],['sec',60,'00']].forEach(([id,max,def],i) => {
    if (i>0) { const c=document.createElement('span'); c.className='colon'; c.textContent=':'; tp.appendChild(c); }
    const s = document.createElement('select');
    s.id = id; s.addEventListener('change', updatePreview);
    for (let n=0; n<max; n++) {
      const o = document.createElement('option');
      o.value = o.textContent = String(n).padStart(2,'0');
      if (o.value===def) o.selected=true;
      s.appendChild(o);
    }
    tp.appendChild(s);
  });

  // ── Prefill ──
  // 解析使用者貼上的預填連結，自動取得欄位 ID
  let parsedFieldMap = {};  // { 'entry.XXXXX': 'name'|'phone'|'email'|'nick' }
  let parsedBase = '';

  function parsePrefill() {
    const raw = document.getElementById('prefillRaw').value.trim();
    const result = document.getElementById('parseResult');
    parsedFieldMap = {};
    parsedBase = '';

    if (!raw || !raw.includes('docs.google.com/forms')) {
      result.style.display = 'none';
      updatePreview();
      return;
    }

    try {
      const urlObj = new URL(raw);
      parsedBase = urlObj.origin + urlObj.pathname.replace(/\/(edit|viewform|formResponse).*$/, '') + '/viewform';

      // 取出所有 entry.XXXXX 參數
      const entries = [];
      urlObj.searchParams.forEach((val, key) => {
        if (key.startsWith('entry.')) {
          entries.push({ key, val });
        }
      });

      // 顯示解析結果，讓使用者確認欄位對應
      if (entries.length > 0) {
        result.style.display = 'block';
        result.innerHTML = '<span style="color:var(--muted);display:block;margin-bottom:6px;">✅ 偵測到 ' + entries.length + ' 個欄位，請確認對應：</span>'
          + entries.map(({key, val}) => `<span style="color:#a5f3fc">${key}</span> <span style="color:var(--muted)">→ 範例值：</span><span style="color:#fbbf24">${val}</span>`).join('<br>');

        // 自動猜測欄位對應
        entries.forEach(({key, val}) => {
          const v = val.toLowerCase();
          if (v.includes('@') || v.includes('gmail') || v.includes('mail')) {
            parsedFieldMap[key] = 'email';
          } else if (/^09\d{8}$/.test(val) || /^\d{8,10}$/.test(val)) {
            parsedFieldMap[key] = 'phone';
          } else if (entries.indexOf(entries.find(e => e.key === key)) === 0) {
            // 第一個欄位猜名字
            parsedFieldMap[key] = 'name';
          }
        });
      } else {
        result.style.display = 'block';
        result.innerHTML = '<span style="color:#f87171">⚠️ 找不到欄位 ID，請確認是否為預填連結格式</span>';
      }
    } catch(e) {
      result.style.display = 'block';
      result.innerHTML = '<span style="color:#f87171">⚠️ 網址格式錯誤</span>';
    }

    updatePreview();
  }

  function buildPrefillUrl() {
    if (!parsedBase) return null;
    const profile = {
      name:  document.getElementById('name').value.trim(),
      nick:  document.getElementById('nick').value.trim(),
      phone: document.getElementById('phone').value.trim(),
      email: document.getElementById('email').value.trim()
    };
    const params = new URLSearchParams();

    // 如果有自動猜測的對應，用真實資料取代
    if (Object.keys(parsedFieldMap).length > 0) {
      Object.entries(parsedFieldMap).forEach(([key, type]) => {
        if (profile[type]) params.append(key, profile[type]);
      });
    } else {
      // 沒有猜測到，把所有 entry 都帶真實姓名（fallback）
      const raw = document.getElementById('prefillRaw').value.trim();
      try {
        const urlObj = new URL(raw);
        urlObj.searchParams.forEach((val, key) => {
          if (key.startsWith('entry.')) params.append(key, profile.name || val);
        });
      } catch(e) {}
    }

    const qs = params.toString();
    return qs ? `${parsedBase}?${qs}&usp=pp_url` : parsedBase;
  }

  function updatePreview() {
    const url = buildPrefillUrl();
    const preview = document.getElementById('prefillPreview');
    if (!url) { preview.classList.remove('show'); return; }
    preview.classList.add('show');
    const short = url.length > 90 ? url.slice(0,90) + '...' : url;
    preview.innerHTML = `<span style="color:var(--muted);display:block;margin-bottom:4px;font-size:10px;">預填網址預覽</span><span style="color:#60a5fa">${short}</span>`;
  }

  // ── Sniper ──
  let timer = null;

  function doStart() {
    const raw = document.getElementById('prefillRaw').value.trim();
    if (!raw || !parsedBase) { alert('請先貼上預填連結'); return; }
    const h = document.getElementById('hour').value;
    const m = document.getElementById('min').value;
    const s = document.getElementById('sec').value;
    const targetStr = `${h}:${m}:${s}`;
    const prefillUrl = buildPrefillUrl() || parsedBase;

    document.getElementById('startBtn').disabled = true;
    document.getElementById('cancelBtn').classList.add('show');
    document.getElementById('countdown').classList.add('show');
    document.getElementById('cdTarget').textContent = `目標時間 ${targetStr}`;
    setStatus('waiting', `等待中，目標 ${targetStr}`);

    sessionStorage.setItem('sniperUrl', prefillUrl);
    sessionStorage.setItem('sniperTarget', targetStr);
    startCountdown(targetStr, prefillUrl);
  }

  function startCountdown(targetStr, prefillUrl) {
    clearInterval(timer);
    timer = setInterval(() => {
      const now = new Date();
      const [th,tm,ts] = targetStr.split(':').map(Number);
      const target = new Date(now);
      target.setHours(th,tm,ts,0);
      if (target <= now) target.setDate(target.getDate()+1);
      const diff = target - now;
      const hh = Math.floor(diff/3600000);
      const mm = Math.floor((diff%3600000)/60000);
      const ss = Math.floor((diff%60000)/1000);
      const cdEl = document.getElementById('cdTime');
      cdEl.textContent = `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
      cdEl.className = 'cd-time' + (diff < 10000 ? ' urgent' : '');
      const nowStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
      if (nowStr >= targetStr) { clearInterval(timer); launch(prefillUrl); }
    }, 200);
  }

  function launch(prefillUrl) {
    setStatus('done', '✅ 時間到！正在跳轉表單...');
    document.getElementById('cdTime').textContent = '00:00:00';
    setTimeout(() => { window.location.href = prefillUrl; }, 300);
  }

  function doCancel() {
    clearInterval(timer);
    sessionStorage.removeItem('sniperUrl');
    sessionStorage.removeItem('sniperTarget');
    document.getElementById('startBtn').disabled = false;
    document.getElementById('cancelBtn').classList.remove('show');
    document.getElementById('countdown').classList.remove('show');
    document.getElementById('statusBox').classList.remove('show');
    document.getElementById('cdTime').textContent = '--:--:--';
  }

  function setStatus(state, msg) {
    const box = document.getElementById('statusBox');
    box.className = 'show ' + state;
    document.getElementById('statusText').textContent = msg;
  }

  // ── Init: check session ──
  window.addEventListener('load', () => {
    const userRaw = sessionStorage.getItem('user');
    if (userRaw) {
      loadUser(JSON.parse(userRaw));
      showPage('mainPage');
      // Restore countdown if active
      const savedUrl = sessionStorage.getItem('sniperUrl');
      const savedTarget = sessionStorage.getItem('sniperTarget');
      if (savedUrl && savedTarget) {
        const now = new Date();
        const nowStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
        if (nowStr < savedTarget) {
          document.getElementById('startBtn').disabled = true;
          document.getElementById('cancelBtn').classList.add('show');
          document.getElementById('countdown').classList.add('show');
          document.getElementById('cdTarget').textContent = `目標時間 ${savedTarget}`;
          setStatus('waiting', `等待中，目標 ${savedTarget}`);
          startCountdown(savedTarget, savedUrl);
        }
      }
    }

    // Enter key on login
    document.getElementById('loginPhone').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  });
</script>
</body>
</html>
